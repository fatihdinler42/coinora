<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Coinora</title>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial}

/* LOGO */
header{text-align:center;padding:20px}
.logo{width:160px;filter:drop-shadow(0 0 15px gold)}

/* KAYAN YAZI */
.ticker{overflow:hidden;white-space:nowrap;border-top:1px solid gold;border-bottom:1px solid gold}
.ticker span{display:inline-block;padding:10px 30px;animation:scroll 25s linear infinite}
@keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

/* COINS */
.coins{display:flex;overflow-x:auto;padding:10px}
.coin{background:#111827;margin:5px;padding:8px;border-radius:10px;cursor:pointer}
.coin:hover{background:#1f2937}

/* INPUT */
input{width:90%;margin:10px auto;display:block;padding:10px;border-radius:10px;border:none;background:#1e293b;color:white}

/* COMMENTS */
.comment{background:#111827;margin:10px;padding:10px;border-radius:10px}
.name{color:gold}
.actions span{margin-right:10px;cursor:pointer}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
</header>

<div class="ticker" id="ticker">Yükleniyor...</div>

<div class="coins" id="coinList"></div>

<input placeholder="Coin ara...">

<div id="chart"></div>

<div style="padding:20px">
<h2 id="title">Yorumlar</h2>

<input id="username" placeholder="İsmin">
<input id="commentInput" placeholder="Yorum yaz">
<button onclick="addComment()">Gönder</button>

<div id="commentsList"></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
let currentSymbol="BTCUSDT";

/* KAYAN YAZI + COIN */
async function loadCoins(){
try{
const res=await fetch("https://api.binance.com/api/v3/ticker/price");
const data=await res.json();

let ticker="";
let coins="";

data.slice(0,40).forEach(c=>{
const color=Math.random()>0.5?"lime":"red";

ticker+=`<span style="color:${color}">${c.symbol} ${parseFloat(c.price).toFixed(2)}</span>`;

coins+=`<div class="coin" onclick="changeCoin('${c.symbol}')">${c.symbol}</div>`;
});

document.getElementById("ticker").innerHTML=ticker;
document.getElementById("coinList").innerHTML=coins;

}catch(e){
document.getElementById("ticker").innerHTML="API hata verdi";
}
}

/* COIN DEĞİŞ */
function changeCoin(symbol){
currentSymbol=symbol;

document.getElementById("chart").innerHTML="";

new TradingView.widget({
width:"100%",
height:500,
symbol:"BINANCE:"+symbol,
container_id:"chart",
theme:"dark"
});

document.getElementById("title").innerText=symbol+" Yorumlar";

loadComments();
}

/* FAKE COMMENT SYSTEM (TEST İÇİN) */
let comments=[];

function addComment(){
const user=document.getElementById("username").value || "Anonim";
const text=document.getElementById("commentInput").value;

if(!text)return;

comments.push({
id:Date.now(),
user,
text,
coin:currentSymbol,
likes:0,
dislikes:0
});

document.getElementById("commentInput").value="";
loadComments();
}

function loadComments(){
const list=document.getElementById("commentsList");
list.innerHTML="";

let arr=comments.filter(c=>c.coin===currentSymbol);

arr.sort((a,b)=>b.likes-a.likes);

arr.forEach(d=>{
list.innerHTML+=`
<div class="comment">
<div class="name">${d.user}</div>
<div>${d.text}</div>
<div class="actions">
<span onclick="like(${d.id})">👍 ${d.likes}</span>
<span onclick="dislike(${d.id})">👎 ${d.dislikes}</span>
</div>
</div>`;
});
}

function like(id){
const c=comments.find(x=>x.id==id);
c.likes++;
loadComments();
}

function dislike(id){
const c=comments.find(x=>x.id==id);
c.dislikes++;
loadComments();
}

/* START */
loadCoins();
changeCoin("BTCUSDT");
</script>

</body>
</html>
