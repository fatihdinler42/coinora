<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Coinora</title>

<style>
body{margin:0;font-family:Arial;background:#020617;color:white}

/* HEADER */
header{text-align:center;padding:20px;background:#020617}
.logo{width:180px;filter:drop-shadow(0 0 15px gold)}

/* KAYAN YAZI */
.ticker{
overflow:hidden;
white-space:nowrap;
border-top:1px solid gold;
border-bottom:1px solid gold;
padding:10px 0;
}

.ticker span{
display:inline-block;
padding-right:50px;
animation:scroll 30s linear infinite;
font-weight:bold;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* COIN LIST */
.coins{display:flex;overflow:auto;padding:10px}
.coin{margin:5px;padding:10px;background:#0f172a;border-radius:10px;cursor:pointer}
.coin img{width:25px;vertical-align:middle}

/* SEARCH */
input{width:90%;margin:10px auto;display:block;padding:10px;border-radius:10px;border:none;background:#1e293b;color:white}

/* COMMENTS */
.comments{padding:20px}
.comment{background:#0f172a;margin:10px 0;padding:10px;border-radius:10px}
.name{color:gold;font-weight:bold}
.actions span{margin-right:10px;cursor:pointer}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
</header>

<div class="ticker" id="ticker"></div>

<div class="coins" id="coinList"></div>

<input id="search" placeholder="Coin ara...">

<div id="chart"></div>

<div class="comments">
<h2 id="title">Yorumlar</h2>

<input id="username" placeholder="İsmin">
<input id="commentInput" placeholder="Yorum yaz">

<button onclick="addComment()">Gönder</button>

<div id="commentsList"></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "SENİNKEY",
authDomain: "SENİNKEY",
projectId: "SENİNKEY"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentSymbol="BTCUSDT";

/* COIN API */
async function loadCoins(){
const res=await fetch("https://api.binance.com/api/v3/ticker/price");
const data=await res.json();

let tickerHTML="";
let coinHTML="";

data.slice(0,30).forEach(c=>{
const color=Math.random()>0.5?"lime":"red";

tickerHTML+=`<span style="color:${color}">${c.symbol} ${parseFloat(c.price).toFixed(2)}</span>`;

coinHTML+=`
<div class="coin" onclick="changeCoin('${c.symbol}')">
<img src="https://cryptoicons.org/api/icon/btc/50">
${c.symbol}
</div>`;
});

document.getElementById("ticker").innerHTML=tickerHTML;
document.getElementById("coinList").innerHTML=coinHTML;
}

window.changeCoin=function(symbol){
currentSymbol=symbol;
document.getElementById("title").innerText=symbol+" Yorumlar";

new TradingView.widget({
width:"100%",
height:500,
symbol:"BINANCE:"+symbol,
container_id:"chart",
theme:"dark"
});

loadComments();
};

/* COMMENT ADD */
window.addComment=async function(){
const user=document.getElementById("username").value;
const text=document.getElementById("commentInput").value;

if(!text)return;

await addDoc(collection(db,"comments"),{
user:user||"Anonim",
text:text,
coin:currentSymbol,
likes:0,
dislikes:0
});

document.getElementById("commentInput").value="";
loadComments();
};

/* LOAD COMMENTS */
window.loadComments=async function(){
const list=document.getElementById("commentsList");
list.innerHTML="";

const snap=await getDocs(collection(db,"comments"));

let arr=[];

snap.forEach(docSnap=>{
const d=docSnap.data();

if((d.coin||"BTCUSDT")==currentSymbol){
arr.push({
id:docSnap.id,
...d,
likes:d.likes||0,
dislikes:d.dislikes||0
});
}
});

arr.sort((a,b)=>b.likes-a.likes);

arr.forEach(d=>{
list.innerHTML+=`
<div class="comment">
<div class="name">${d.user||"Anonim"}</div>
<div>${d.text}</div>
<div class="actions">
<span onclick="like('${d.id}',${d.likes})">👍 ${d.likes}</span>
<span onclick="dislike('${d.id}',${d.dislikes})">👎 ${d.dislikes}</span>
</div>
</div>
`;
});
};

/* LIKE */
window.like=async function(id,likes){
const ref=doc(db,"comments",id);
await updateDoc(ref,{likes:(likes||0)+1});
loadComments();
};

window.dislike=async function(id,dislikes){
const ref=doc(db,"comments",id);
await updateDoc(ref,{dislikes:(dislikes||0)+1});
loadComments();
};

/* START */
loadCoins();
changeCoin("BTCUSDT");

</script>

</body>
</html>
