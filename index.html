<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>COINORA</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{background:#020b1c;color:white;font-family:Arial;margin:0}

/* LOGO */
header{text-align:center;padding:20px}
.logo{width:200px}

/* TICKER */
.ticker{
overflow:hidden;
white-space:nowrap;
border-top:1px solid gold;
border-bottom:1px solid gold;
padding:10px;
}
.ticker-inner{
display:inline-block;
animation:scroll 40s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* COINS */
.coins{display:flex;overflow:auto;padding:10px}
.coin{
background:#0b1b3a;
margin-right:10px;
padding:10px;
border-radius:10px;
cursor:pointer;
display:flex;
align-items:center;
gap:5px;
}
.coin img{width:20px}

/* INPUT */
input{
width:90%;
margin:10px;
padding:10px;
border-radius:10px;
border:none;
}

/* COMMENTS */
.comment{border-bottom:1px solid #333;padding:10px}
.btn{
cursor:pointer;
margin-right:10px;
background:#111;
padding:5px 10px;
border-radius:5px;
display:inline-block;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
</header>

<div class="ticker" id="ticker">yükleniyor...</div>

<div class="coins" id="coinList"></div>

<input placeholder="Coin ara...">

<div id="chart" style="height:500px"></div>

<div style="padding:20px">
<h2 id="title">BTCUSDT Yorumlar</h2>

<input id="username" placeholder="İsmin">
<input id="commentInput" placeholder="Yorum yaz">
<button onclick="addComment()">Gönder</button>

<div id="commentsList"></div>
</div>

<script type="module">

// 🔥 FIREBASE (KENDİNİ KOY)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "BURAYA",
authDomain: "BURAYA",
projectId: "BURAYA",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.currentSymbol="BTCUSDT";

// 🚀 COINS + GERÇEK RENK
async function loadCoins(){

const res=await fetch("https://api.binance.com/api/v3/ticker/24hr");
const data=await res.json();

let ticker="";
let coins="";

data.slice(0,80).forEach(c=>{

const price=parseFloat(c.lastPrice);
const change=parseFloat(c.priceChangePercent);
const green=change>=0;

ticker+=`
<span style="color:${green?"lime":"red"}">
${c.symbol} ${price.toFixed(2)} (${change.toFixed(2)}%)
</span>
`;

coins+=`
<div class="coin" onclick="changeCoin('${c.symbol}')">

<img src="https://assets.coincap.io/assets/icons/${c.symbol.slice(0,3).toLowerCase()}@2x.png"
onerror="this.src='https://via.placeholder.com/20'">

${c.symbol}
</div>
`;
});

// 💣 ÇİFT YAZI → boşluk yok
document.getElementById("ticker").innerHTML =
'<div class="ticker-inner">'+ticker+ticker+'</div>';

document.getElementById("coinList").innerHTML=coins;
}

// 📊 CHART
function loadChart(symbol){
new TradingView.widget({
container_id:"chart",
symbol:"BINANCE:"+symbol,
interval:"1",
theme:"dark"
});
}

// 🔄 COIN
window.changeCoin=function(symbol){
window.currentSymbol=symbol;
document.getElementById("title").innerText=symbol+" Yorumlar";
loadChart(symbol);
loadComments();
}

// 💬 ADD COMMENT
window.addComment=async function(){

const user=document.getElementById("username").value;
const text=document.getElementById("commentInput").value;

if(!text) return;

await addDoc(collection(db,"comments"),{
user:user||"Anonim",
text:text,
coin:window.currentSymbol,
likes:0,
dislikes:0
});

document.getElementById("commentInput").value="";
loadComments();
}

// 👍 LIKE
window.likeComment=async function(id,likes){
await updateDoc(doc(db,"comments",id),{likes:likes+1});
loadComments();
}

// 👎 DISLIKE
window.dislikeComment=async function(id,dislikes){
await updateDoc(doc(db,"comments",id),{dislikes:dislikes+1});
loadComments();
}

// 📥 LOAD COMMENTS
async function loadComments(){

const list=document.getElementById("commentsList");
list.innerHTML="";

const snap=await getDocs(collection(db,"comments"));

let arr=[];

snap.forEach(d=>{
const data=d.data();

if((data.coin||"BTCUSDT")==window.currentSymbol){
arr.push({id:d.id,...data});
}
});

// 🔥 LIKE SIRALAMA
arr.sort((a,b)=>b.likes-a.likes);

arr.forEach(c=>{
list.innerHTML+=`
<div class="comment">

<b>${c.user}</b><br>
${c.text}<br><br>

<span class="btn" onclick="likeComment('${c.id}',${c.likes||0})">
👍 ${c.likes||0}
</span>

<span class="btn" onclick="dislikeComment('${c.id}',${c.dislikes||0})">
👎 ${c.dislikes||0}
</span>

</div>
`;
});
}

// 🚀 INIT
loadCoins();
loadChart("BTCUSDT");
loadComments();

</script>

</body>
</html>
