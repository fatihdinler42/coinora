<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>COINORA</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{background:#020b1c;color:white;font-family:Arial;margin:0}

/* HEADER */
header{text-align:center;padding:20px}
.logo{width:200px}

/* KAYAN YAZI */
.ticker{
white-space:nowrap;
overflow:hidden;
border-top:1px solid gold;
border-bottom:1px solid gold;
padding:10px;
}
.ticker span{
display:inline-block;
margin-right:40px;
animation:scroll 20s linear infinite;
font-weight:bold;
}
@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* COIN BAR */
.coins{display:flex;overflow:auto;padding:10px}
.coin{
background:#0b1b3a;
margin-right:10px;
padding:10px;
border-radius:10px;
cursor:pointer;
display:flex;
align-items:center;
gap:5px;
}
.coin img{width:20px}

/* INPUT */
input{
width:90%;
margin:10px;
padding:10px;
border-radius:10px;
border:none;
}

/* COMMENTS */
.comment{border-bottom:1px solid #333;padding:10px}
.btn{cursor:pointer;margin-right:10px}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
</header>

<div class="ticker" id="ticker">yükleniyor...</div>

<div class="coins" id="coinList"></div>

<input placeholder="Coin ara...">

<div id="chart" style="height:500px"></div>

<div style="padding:20px">
<h2 id="newsTitle">Haberler</h2>
<div id="news"></div>

<h2 id="title">Yorumlar</h2>

<input id="username" placeholder="İsmin">
<input id="commentInput" placeholder="Yorum yaz">

<button onclick="addComment()">Gönder</button>

<div id="commentsList"></div>
</div>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "BURAYA_API",
authDomain: "BURAYA",
projectId: "BURAYA",
storageBucket: "BURAYA",
messagingSenderId: "BURAYA",
appId: "BURAYA"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// GLOBAL
window.currentSymbol="BTCUSDT";

// 🚀 COIN LOAD
async function loadCoins(){

let data;

try{
const res=await fetch("https://api.binance.com/api/v3/ticker/price");
data=await res.json();
}catch{
const res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd");
const cg=await res.json();
data=cg.map(c=>({
symbol:c.symbol.toUpperCase()+"USDT",
price:c.current_price
}));
}

let ticker="";
let coins="";

data.slice(0,30).forEach(c=>{
const green=Math.random()>0.5;
ticker+=`<span style="color:${green?"lime":"red"}">${c.symbol} ${Number(c.price).toFixed(2)}</span>`;

coins+=`
<div class="coin" onclick="changeCoin('${c.symbol}')">
<img src="https://cryptoicons.org/api/icon/${c.symbol.slice(0,3).toLowerCase()}/32">
${c.symbol}
</div>`;
});

document.getElementById("ticker").innerHTML=ticker;
document.getElementById("coinList").innerHTML=coins;
}

// 📊 CHART
function loadChart(symbol){
new TradingView.widget({
container_id:"chart",
symbol:"BINANCE:"+symbol,
interval:"1",
theme:"dark"
});
}

// 🔄 COIN CHANGE
window.changeCoin=function(symbol){
window.currentSymbol=symbol;

document.getElementById("title").innerText=symbol+" Yorumlar";
document.getElementById("newsTitle").innerText=symbol+" Haberler";

loadChart(symbol);
loadComments();
loadNews(symbol);
}

// 💬 YORUM EKLE
window.addComment=async function(){

const user=document.getElementById("username").value;
const text=document.getElementById("commentInput").value;

if(!text)return;

await addDoc(collection(db,"comments"),{
user:user||"Anonim",
text:text,
coin:window.currentSymbol,
likes:0,
dislikes:0
});

document.getElementById("commentInput").value="";
loadComments();
}

// 👍 LIKE
window.likeComment=async function(id,likes){
const ref=doc(db,"comments",id);
await updateDoc(ref,{likes:likes+1});
loadComments();
}

// 👎 DISLIKE
window.dislikeComment=async function(id,dislikes){
const ref=doc(db,"comments",id);
await updateDoc(ref,{dislikes:dislikes+1});
loadComments();
}

// 📥 LOAD COMMENTS
async function loadComments(){

const list=document.getElementById("commentsList");
list.innerHTML="";

const snap=await getDocs(collection(db,"comments"));

let arr=[];

snap.forEach(d=>{
const data=d.data();

if((data.coin||"BTCUSDT")==window.currentSymbol){
arr.push({
id:d.id,
...data
});
}
});

// 🔥 LIKE SIRALAMA
arr.sort((a,b)=>b.likes-a.likes);

arr.forEach(c=>{
list.innerHTML+=`
<div class="comment">
<b>${c.user}</b><br>
${c.text}<br>
<span class="btn" onclick="likeComment('${c.id}',${c.likes||0})">👍 ${c.likes||0}</span>
<span class="btn" onclick="dislikeComment('${c.id}',${c.dislikes||0})">👎 ${c.dislikes||0}</span>
</div>`;
});
}

// 📰 HABER (demo)
function loadNews(symbol){
document.getElementById("news").innerHTML=`
<div>${symbol} yükseliş trendinde</div>
<div>${symbol} yatırımcı ilgisi artıyor</div>
`;
}

// INIT
loadCoins();
loadChart("BTCUSDT");
loadComments();
loadNews("BTCUSDT");

</script>

</body>
</html>
