<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>CoinOra FIREBASE</title>

<style>
body {
    background: linear-gradient(135deg,#020617,#0f172a);
    color:white;
    font-family:Arial;
    text-align:center;
}

#coinList {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.coin {
    background:#1e293b;
    margin:15px;
    padding:20px;
    border-radius:15px;
    width:260px;
}

.up {color:#22c55e;}
.down {color:#ef4444;}
</style>

</head>

<body>

<h1>🚀 CoinOra FIREBASE</h1>

<div id="coinList"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
  apiKey: "BURAYA_API_KEY",
  authDomain: "xxx.firebaseapp.com",
  projectId: "xxx",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function getCoins(){
    const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd");
    const data = await res.json();

    let html="";

    data.slice(0,6).forEach(c=>{
        let change = c.price_change_percentage_24h?.toFixed(2) || 0;
        let cls = change >= 0 ? "up" : "down";

        html+=`
        <div class="coin">
            <h2>${c.name}</h2>
            <p>$${c.current_price}</p>
            <p class="${cls}">${change}%</p>

            <button onclick="addComment('${c.id}')">💬 Yorum Ekle</button>
        </div>
        `;
    });

    document.getElementById("coinList").innerHTML=html;
}

async function addComment(coin){
    let text = prompt("Yorum yaz:");
    if(!text) return;

    await db.collection("comments").add({
        coin: coin,
        text: text,
        time: Date.now()
    });

    alert("Kaydedildi!");
}

getCoins();

</script>

</body>
</html>
