<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coinora</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 15px;
}

.logo {
  width: 140px;
  filter: drop-shadow(0 0 10px gold);
}

/* TICKER */
.ticker {
  overflow: hidden;
  border-top: 1px solid gold;
  border-bottom: 1px solid gold;
}

.ticker-content {
  display: inline-block;
  white-space: nowrap;
  animation: scroll 80s linear infinite;
  padding: 8px;
  font-size: 14px;
  color: gold;
}

@keyframes scroll {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

/* SEARCH */
input {
  width: 90%;
  margin: 10px auto;
  display: block;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #1e293b;
  color: white;
}

/* COIN LIST */
.coin-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

.coin {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  transition: 0.2s;
}

.coin:active {
  transform: scale(0.95);
  background: #334155;
}

.coin img {
  width: 35px;
}

.price {
  font-size: 16px;
  margin-top: 5px;
}

.up { color: lime; }
.down { color: red; }

/* CHART */
#tradingview_chart {
  margin: 10px;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
</header>

<div class="ticker">
  <div class="ticker-content" id="ticker"></div>
</div>

<input type="text" placeholder="Coin ara..." onkeyup="filterCoins(this.value)">

<div class="coin-list" id="coins"></div>

<div id="tradingview_chart"></div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
let currentSymbol = "BINANCE:BTCUSDT";
let allCoins = [];

/* CHART */
function loadChart() {
  document.getElementById("tradingview_chart").innerHTML = "";
  new TradingView.widget({
    width: "100%",
    height: 400,
    symbol: currentSymbol,
    theme: "dark",
    container_id: "tradingview_chart"
  });
}

/* COINS */
async function loadCoins() {
  const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&per_page=100&page=1");
  const data = await res.json();

  allCoins = data;
  renderCoins(data);
}

function renderCoins(coins) {
  const container = document.getElementById("coins");
  container.innerHTML = "";

  coins.forEach(c => {
    const change = c.price_change_percentage_24h;
    const cls = change >= 0 ? "up" : "down";

    const el = document.createElement("div");
    el.className = "coin";

    el.innerHTML = `
      <img src="${c.image}">
      <div>${c.symbol.toUpperCase()}</div>
      <div class="price $${cls}">
        $${c.current_price}
      </div>
    `;

    el.onclick = () => {
      currentSymbol = "BINANCE:" + c.symbol.toUpperCase() + "USDT";
      loadChart();
    };

    container.appendChild(el);
  });
}

/* SEARCH */
function filterCoins(val) {
  val = val.toLowerCase();
  const filtered = allCoins.filter(c =>
    c.symbol.toLowerCase().includes(val)
  );
  renderCoins(filtered);
}

/* TICKER */
async function loadTicker() {
  const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&per_page=100&page=1");
  const data = await res.json();

  let text = "";

  data.forEach(c => {
    const color = c.price_change_percentage_24h >= 0 ? "lime" : "red";

    text += `
      <span style="margin-right:30px;">
        ${c.symbol.toUpperCase()} $${c.current_price}
        <span style="color:${color}">
          (${c.price_change_percentage_24h.toFixed(1)}%)
        </span>
      </span>
    `;
  });

  document.getElementById("ticker").innerHTML = text.repeat(3);
}

/* START */
loadCoins();
loadTicker();
loadChart();

setInterval(loadTicker, 30000);
</script>

</body>
</html>
