<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Coinora</title>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial}

/* LOGO */
header{text-align:center;padding:20px}
.logo{width:160px;filter:drop-shadow(0 0 15px gold)}

/* KAYAN YAZI */
.ticker{overflow:hidden;white-space:nowrap;border-top:1px solid gold;border-bottom:1px solid gold}
.ticker span{display:inline-block;padding:10px 30px;animation:scroll 25s linear infinite}
@keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

/* COINS */
.coins{display:flex;overflow-x:auto;padding:10px}
.coin{background:#111827;margin:5px;padding:8px;border-radius:10px;cursor:pointer}
.coin img{width:20px;margin-right:5px}

/* INPUT */
input{width:90%;margin:10px auto;display:block;padding:10px;border-radius:10px;border:none;background:#1e293b;color:white}

/* COMMENTS */
.comment{background:#111827;margin:10px;padding:10px;border-radius:10px}
.name{color:gold}
.actions span{margin-right:10px;cursor:pointer}

/* NEWS */
.news{padding:20px}
.news-item{background:#111827;margin:10px;padding:10px;border-radius:10px}
.news-item a{color:gold;text-decoration:none}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
</header>

<div class="ticker" id="ticker"></div>
<div class="coins" id="coinList"></div>

<div id="chart"></div>

<div class="news">
<h2 id="newsTitle">Haberler</h2>
<div id="newsList"></div>
</div>

<div style="padding:20px">
<h2 id="title">Yorumlar</h2>

<input id="username" placeholder="İsmin">
<input id="commentInput" placeholder="Yorum yaz">
<button onclick="addComment()">Gönder</button>

<div id="commentsList"></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "BURAYA SENİN",
authDomain: "BURAYA",
projectId: "BURAYA"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentSymbol="BTCUSDT";

/* COIN API */
async function loadCoins(){
const res=await fetch("https://api.binance.com/api/v3/ticker/price");
const data=await res.json();

let ticker="";
let coins="";

data.slice(0,40).forEach(c=>{
const color=Math.random()>0.5?"lime":"red";

ticker+=`<span style="color:${color}">${c.symbol} ${parseFloat(c.price).toFixed(2)}</span>`;

coins+=`
<div class="coin" onclick="changeCoin('${c.symbol}')">
<img src="https://cryptoicons.org/api/icon/${c.symbol.slice(0,3).toLowerCase()}/32">
${c.symbol}
</div>`;
});

document.getElementById("ticker").innerHTML=ticker;
document.getElementById("coinList").innerHTML=coins;
}

/* HABER API */
async function loadNews(symbol){
const coin=symbol.replace("USDT","");

const res=await fetch(`https://min-api.cryptocompare.com/data/v2/news/?categories=${coin}`);
const data=await res.json();

let html="";

data.Data.slice(0,5).forEach(n=>{
html+=`
<div class="news-item">
<a href="${n.url}" target="_blank">${n.title}</a>
</div>`;
});

document.getElementById("newsList").innerHTML=html;
}

/* COIN CHANGE */
window.changeCoin=function(symbol){
currentSymbol=symbol;

document.getElementById("chart").innerHTML="";

new TradingView.widget({
width:"100%",
height:500,
symbol:"BINANCE:"+symbol,
container_id:"chart",
theme:"dark"
});

document.getElementById("title").innerText=symbol+" Yorumlar";
document.getElementById("newsTitle").innerText=symbol+" Haberler";

loadComments();
loadNews(symbol);
};

/* ADD COMMENT */
window.addComment=async function(){
const user=document.getElementById("username").value;
const text=document.getElementById("commentInput").value;

if(!text)return;

await addDoc(collection(db,"comments"),{
user:user||"Anonim",
text:text,
coin:currentSymbol,
likes:0,
dislikes:0
});

document.getElementById("commentInput").value="";
loadComments();
};

/* LOAD COMMENTS */
window.loadComments=async function(){
const list=document.getElementById("commentsList");
list.innerHTML="";

const snap=await getDocs(collection(db,"comments"));

let arr=[];

snap.forEach(docSnap=>{
const d=docSnap.data();

if((d.coin||"BTCUSDT")==currentSymbol){
arr.push({
id:docSnap.id,
...d,
likes:d.likes||0,
dislikes:d.dislikes||0
});
}
});

arr.sort((a,b)=>b.likes-a.likes);

arr.forEach(d=>{
list.innerHTML+=`
<div class="comment">
<div class="name">${d.user}</div>
<div>${d.text}</div>
<div class="actions">
<span onclick="like('${d.id}',${d.likes})">👍 ${d.likes}</span>
<span onclick="dislike('${d.id}',${d.dislikes})">👎 ${d.dislikes}</span>
</div>
</div>`;
});
};

/* LIKE */
window.like=async function(id,likes){
const ref=doc(db,"comments",id);
await updateDoc(ref,{likes:(likes||0)+1});
loadComments();
};

window.dislike=async function(id,dislikes){
const ref=doc(db,"comments",id);
await updateDoc(ref,{dislikes:(dislikes||0)+1});
loadComments();
};

/* START */
loadCoins();
changeCoin("BTCUSDT");

</script>

</body>
</html>
