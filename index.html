<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coinora</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
}

.logo {
  width: 180px;
  transition: 0.3s;
  filter: drop-shadow(0 0 10px gold);
}

.logo:hover {
  transform: scale(1.08);
  filter: drop-shadow(0 0 25px gold);
}

/* KAYAN YAZI */
.ticker {
  width: 100%;
  overflow: hidden;
  border-top: 1px solid gold;
  border-bottom: 1px solid gold;
}

.ticker-content {
  display: inline-block;
  white-space: nowrap;
  animation: scroll 20s linear infinite;
  padding: 10px;
  font-weight: bold;
  color: gold;
}

@keyframes scroll {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

input {
  width: 90%;
  padding: 12px;
  margin: 15px auto;
  display: block;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}
</style>

</head>

<body>

<header>
  <img src="logo.png" class="logo">
</header>

<div class="ticker">
  <div class="ticker-content" id="ticker"></div>
</div>

<input type="text" placeholder="Coin ara...">

<div id="tradingview_chart"></div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
  width: "100%",
  height: 500,
  symbol: "BINANCE:BTCUSDT",
  theme: "dark",
  container_id: "tradingview_chart"
});

/* KAYAN YAZI */
async function loadTicker() {
  const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1");
  const data = await res.json();

  let text = "";

  data.forEach(c => {
    const color = c.price_change_percentage_24h >= 0 ? "lime" : "red";

    text += `
      <span style="margin-right:40px;">
        ${c.symbol.toUpperCase()} $${c.current_price}
        <span style="color:${color}">
          (${c.price_change_percentage_24h.toFixed(2)}%)
        </span>
      </span>
    `;
  });

  document.getElementById("ticker").innerHTML = text;
}

loadTicker();
setInterval(loadTicker, 30000);
</script>

</body>
</html>
