<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>CoinOra ULTRA</title>

<style>
body {
    background: linear-gradient(135deg,#020617,#0f172a);
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 {
    font-size: 40px;
    background: linear-gradient(90deg,#38bdf8,#22c55e,#a855f7);
    -webkit-background-clip: text;
    color: transparent;
}

.ticker {
    overflow:hidden;
    white-space:nowrap;
    animation:ticker 25s linear infinite;
    background:#020617;
    padding:10px;
}

@keyframes ticker {
    0% {transform:translateX(100%)}
    100% {transform:translateX(-100%)}
}

#coinList {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.coin {
    background:#1e293b;
    margin:15px;
    padding:20px;
    border-radius:15px;
    width:260px;
}

.up {color:#22c55e; animation:blink 1s infinite;}
.down {color:#ef4444; animation:blink 1s infinite;}

@keyframes blink {
    50%{opacity:0.4;}
}

button {
    margin:5px;
    padding:5px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.like {background:#22c55e;}
.dislike {background:#ef4444;}
</style>

</head>

<body>

<h1>🚀 CoinOra ULTRA</h1>

<div class="ticker" id="ticker"></div>
<div id="coinList"></div>

<script>

let likes={},dislikes={},comments={},favorites={};

async function getCoins(){
    const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd");
    const data = await res.json();

    let ticker="";
    let html="";

    data.slice(0,12).forEach(c=>{

        let change = c.price_change_percentage_24h?.toFixed(2) || 0;
        let cls = change >= 0 ? "up" : "down";
        let icon = change >= 0 ? "📈" : "📉";

        if(!likes[c.id]) likes[c.id]=0;
        if(!dislikes[c.id]) dislikes[c.id]=0;
        if(!comments[c.id]) comments[c.id]=[];

        ticker += `${c.symbol.toUpperCase()} ${c.current_price}$ (${change}%) 🔥 — `;

        html+=`
        <div class="coin">
            <h2>${favorites[c.id]?"⭐":""} ${c.name}</h2>

            <img src="${c.image}" width="40">

            <p>$${c.current_price}</p>
            <p class="${cls}">${icon} ${change}%</p>

            <div style="font-size:24px; margin:10px;">
                <span onclick='openChart("${c.symbol}")' style="cursor:pointer">📊</span>
                <span onclick='openNews("${c.name}")' style="cursor:pointer">📰</span>
            </div>

            <button onclick="toggleFav('${c.id}')">⭐ Favori</button>
            <button class="like" onclick="like('${c.id}')">👍 ${likes[c.id]}</button>
            <button class="dislike" onclick="dislike('${c.id}')">👎 ${dislikes[c.id]}</button>

            <div>
                <input placeholder="Yorum..." id="i-${c.id}">
                <button onclick="addComment('${c.id}')">Gönder</button>
            </div>

            <div>
                ${comments[c.id].map(x=>`<p>💬 ${x}</p>`).join("")}
            </div>
        </div>
        `;
    });

    document.getElementById("ticker").innerText=ticker;
    document.getElementById("coinList").innerHTML=html;
}

function like(c){likes[c]++;getCoins();}
function dislike(c){dislikes[c]++;getCoins();}
function toggleFav(c){favorites[c]=!favorites[c];getCoins();}

function addComment(c){
    let val=document.getElementById("i-"+c).value;
    if(val){
        comments[c].push(val);
        getCoins();
    }
}

function openChart(symbol){
    document.body.innerHTML = `
    <h1>📊 ${symbol.toUpperCase()} Grafik</h1>
    <iframe src="https://www.tradingview.com/widgetembed/?symbol=BINANCE:${symbol.toUpperCase()}USDT&theme=dark"
    width="100%" height="500"></iframe>
    <br><br>
    <button onclick="location.reload()">⬅️ Geri</button>
    `;
}

function openNews(name){
    document.body.innerHTML = `
    <h1>📰 ${name} Haberleri</h1>
    <div style="padding:20px">
        <p>🔥 ${name} yatırımcı ilgisi artıyor</p>
        <p>📈 Analistler yükseliş bekliyor</p>
        <p>⚡ Piyasada hareketlilik var</p>
    </div>
    <br>
    <button onclick="location.reload()">⬅️ Geri</button>
    `;
}

setInterval(getCoins,10000);
getCoins();

</script>

</body>
</html>
