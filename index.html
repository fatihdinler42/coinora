<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coinora</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
}

.logo {
  width: 180px;
  transition: 0.3s;
  filter: drop-shadow(0 0 10px gold);
}

.logo:hover {
  transform: scale(1.08);
  filter: drop-shadow(0 0 25px gold);
}

/* TICKER */
.ticker {
  overflow: hidden;
  border-top: 1px solid gold;
  border-bottom: 1px solid gold;
}

.ticker-content {
  display: inline-block;
  white-space: nowrap;
  animation: scroll 80s linear infinite;
  padding: 10px;
  font-weight: bold;
  color: gold;
}

@keyframes scroll {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

/* COINS */
.coin-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 10px;
  padding: 15px;
}

.coin {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.coin:hover {
  background: #334155;
}

input {
  width: 90%;
  padding: 12px;
  margin: 15px auto;
  display: block;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
</header>

<div class="ticker">
  <div class="ticker-content" id="ticker">Yükleniyor...</div>
</div>

<input type="text" placeholder="Coin ara..." onkeyup="filterCoins(this.value)">

<div class="coin-list" id="coins"></div>

<div id="tradingview_chart"></div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
let currentSymbol = "BINANCE:BTCUSDT";
let allCoins = [];

/* CHART */
function loadChart() {
  document.getElementById("tradingview_chart").innerHTML = "";
  new TradingView.widget({
    width: "100%",
    height: 500,
    symbol: currentSymbol,
    theme: "dark",
    container_id: "tradingview_chart"
  });
}

/* COIN LIST */
async function loadCoins() {
  const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&per_page=100&page=1");
  const data = await res.json();

  allCoins = data;

  const container = document.getElementById("coins");
  container.innerHTML = "";

  data.forEach(c => {
    const el = document.createElement("div");
    el.className = "coin";

    el.innerHTML = `
      <img src="${c.image}" width="30"><br>
      ${c.symbol.toUpperCase()}<br>
      $${c.current_price}
    `;

    el.onclick = () => {
      currentSymbol = "BINANCE:" + c.symbol.toUpperCase() + "USDT";
      loadChart();
    };

    container.appendChild(el);
  });
}

/* SEARCH */
function filterCoins(val) {
  val = val.toLowerCase();
  const filtered = allCoins.filter(c =>
    c.symbol.toLowerCase().includes(val)
  );
  render(filtered);
}

function render(coins) {
  const container = document.getElementById("coins");
  container.innerHTML = "";
  coins.forEach(c => {
    const el = document.createElement("div");
    el.className = "coin";
    el.innerHTML = `${c.symbol.toUpperCase()}<br>$${c.current_price}`;
    el.onclick = () => {
      currentSymbol = "BINANCE:" + c.symbol.toUpperCase() + "USDT";
      loadChart();
    };
    container.appendChild(el);
  });
}

/* TICKER (FULL + TEKRARLI) */
async function loadTicker() {
  try {
    const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&per_page=100&page=1");
    const data = await res.json();

    let text = "";

    data.forEach(c => {
      const color = c.price_change_percentage_24h >= 0 ? "lime" : "red";

      text += `
        <span style="margin-right:40px;">
          ${c.symbol.toUpperCase()} $${c.current_price}
          <span style="color:${color}">
            (${c.price_change_percentage_24h.toFixed(2)}%)
          </span>
        </span>
      `;
    });

    // 💣 boşluk kalmaması için 3 kat
    document.getElementById("ticker").innerHTML = text.repeat(3);

  } catch {
    document.getElementById("ticker").innerHTML =
      "BTC $74,500 • ETH $3,800 • SOL $180 • XRP $0.62 • DOGE $0.15".repeat(5);
  }
}

/* START */
loadCoins();
loadTicker();
loadChart();

setInterval(loadTicker, 30000);
</script>

</body>
</html>
